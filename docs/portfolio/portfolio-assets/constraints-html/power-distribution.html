<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Power Distribution</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;800;900&family=Nunito:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAFAFA;
            --dark: #0A0A0A;
            --muted: #999;
            --accent: #E63322;
            --border: #E0E0E0;
            --blue: #3B82F6;
            --font-display: 'Archivo', sans-serif;
            --font-body: 'Nunito', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%; overflow: hidden;
            background: var(--bg); font-family: var(--font-body);
            color: var(--dark); cursor: pointer; user-select: none;
        }
        .page {
            width: 100vw; height: 100vh;
            display: flex; align-items: center; justify-content: center;
            padding: clamp(1rem, 2vh, 1.5rem) clamp(2rem, 5vw, 4rem);
        }
        .content {
            display: flex; align-items: flex-end;
            gap: clamp(2rem, 6vw, 5rem);
        }

        /* RACK COLUMN */
        .rack-col {
            display: flex; flex-direction: column; align-items: center;
            gap: clamp(0.5rem, 1.2vh, 0.8rem);
        }
        .rack-label {
            font-family: var(--font-display); font-weight: 800;
            font-size: clamp(0.9rem, 1.5vw, 1.15rem); text-align: center;
        }

        /* CSS Rack icon */
        .rack-icon {
            width: clamp(3rem, 7vw, 4.5rem);
            height: clamp(4.5rem, 10vh, 6.5rem);
            background: linear-gradient(180deg, #222 0%, #1a1a1a 100%);
            border-radius: 4px;
            display: flex; flex-direction: column;
            padding: 8% 10%; gap: 3px;
        }
        .rack-unit {
            flex: 1; background: #333; border-radius: 2px;
            display: flex; align-items: center; padding: 0 10%; gap: 3px;
        }
        .rack-dot {
            width: 3px; height: 3px; border-radius: 50%; flex-shrink: 0;
        }
        .rack-dot.green { background: #22C55E; box-shadow: 0 0 3px #22C55E; }
        .rack-dot.red { background: var(--accent); box-shadow: 0 0 3px var(--accent); }
        .rack-line { flex: 1; height: 1.5px; background: #555; border-radius: 1px; }

        /* Power bar */
        .power-bar-wrap {
            display: flex; flex-direction: column; align-items: center;
            gap: clamp(0.2rem, 0.5vh, 0.3rem);
        }
        .power-bar {
            width: clamp(3.5rem, 8vw, 5.5rem);
            height: clamp(10rem, 22vh, 16rem);
            background: #f0f0f0; border-radius: 6px;
            position: relative; overflow: hidden;
            display: flex; align-items: flex-end;
        }
        .power-fill {
            width: 100%; border-radius: 6px;
            height: 0;
            transition: height 1s cubic-bezier(0.16, 1, 0.3, 1);
        }
        .power-fill.blue { background: var(--blue); }
        .power-fill.red { background: linear-gradient(0deg, var(--accent) 0%, #ff6b5c 100%); }
        .kw-number {
            font-family: var(--font-mono); font-weight: 700;
            font-size: clamp(1.3rem, 3vw, 2rem); line-height: 1; text-align: center;
        }
        .kw-number.blue { color: var(--blue); }
        .kw-number.red { color: var(--accent); }
        .kw-unit {
            font-family: var(--font-mono);
            font-size: clamp(0.55rem, 0.9vw, 0.7rem); color: var(--muted);
        }

        /* Multiplier */
        .multiplier {
            display: flex; flex-direction: column; align-items: center; gap: 0.3em;
            align-self: center;
            margin-bottom: clamp(3rem, 8vh, 5rem);
        }
        .mult-number {
            font-family: var(--font-display); font-weight: 900;
            font-size: clamp(2.5rem, 7vw, 4.5rem);
            color: var(--accent); line-height: 1;
        }
        .mult-label {
            font-family: var(--font-mono);
            font-size: clamp(0.6rem, 1vw, 0.78rem); color: var(--muted);
        }

        /* Bottom note */
        .redesign-note {
            position: absolute;
            bottom: clamp(2.5rem, 5vh, 4rem);
            left: 50%; transform: translateX(-50%);
            text-align: center;
            font-family: var(--font-body);
            font-size: clamp(0.75rem, 1.2vw, 0.95rem); color: var(--muted);
        }

        /* REVEAL */
        .r {
            opacity: 0; transform: translateY(14px);
            transition: opacity 0.5s cubic-bezier(0.16,1,0.3,1),
                        transform 0.5s cubic-bezier(0.16,1,0.3,1);
        }
        .r.shown { opacity: 1; transform: translateY(0); }

        .click-hint {
            position: fixed; bottom: clamp(0.8rem, 1.5vh, 1.2rem); right: clamp(1rem, 2vw, 1.5rem);
            font-family: var(--font-mono); font-size: clamp(0.5rem, 0.75vw, 0.6rem);
            color: var(--muted); opacity: 0.5;
        }
        .step-counter {
            position: fixed; bottom: clamp(0.8rem, 1.5vh, 1.2rem); left: clamp(1rem, 2vw, 1.5rem);
            font-family: var(--font-mono); font-size: clamp(0.55rem, 0.85vw, 0.65rem); color: var(--muted);
        }
        .step-counter .cur { color: var(--accent); font-weight: 700; }
    </style>
</head>
<body>
<div class="page">
    <div class="content">
        <div class="rack-col r" data-step="1">
            <div class="rack-label">Traditional Rack</div>
            <div class="rack-icon">
                <div class="rack-unit"><div class="rack-dot green"></div><div class="rack-line"></div></div>
                <div class="rack-unit"><div class="rack-dot green"></div><div class="rack-line"></div></div>
                <div class="rack-unit"><div class="rack-dot green"></div><div class="rack-line"></div></div>
                <div class="rack-unit"><div class="rack-dot green"></div><div class="rack-line"></div></div>
                <div class="rack-unit"><div class="rack-dot green"></div><div class="rack-line"></div></div>
            </div>
            <div class="power-bar-wrap">
                <div class="power-bar"><div class="power-fill blue" id="fillTrad" data-h="18%"></div></div>
                <div class="kw-number blue">15–20</div>
                <div class="kw-unit">kW per rack</div>
            </div>
        </div>

        <div class="multiplier r" data-step="3">
            <div class="mult-number">6–8×</div>
            <div class="mult-label">more power</div>
        </div>

        <div class="rack-col r" data-step="2">
            <div class="rack-label">AI Rack</div>
            <div class="rack-icon">
                <div class="rack-unit"><div class="rack-dot red"></div><div class="rack-line"></div></div>
                <div class="rack-unit"><div class="rack-dot red"></div><div class="rack-line"></div></div>
                <div class="rack-unit"><div class="rack-dot red"></div><div class="rack-line"></div></div>
                <div class="rack-unit"><div class="rack-dot red"></div><div class="rack-line"></div></div>
                <div class="rack-unit"><div class="rack-dot red"></div><div class="rack-line"></div></div>
            </div>
            <div class="power-bar-wrap">
                <div class="power-bar"><div class="power-fill red" id="fillAi" data-h="95%"></div></div>
                <div class="kw-number red">120–160</div>
                <div class="kw-unit">kW per rack</div>
            </div>
        </div>
    </div>
    <div class="redesign-note r" data-step="4">
        Cables, sockets, distribution boxes — <strong style="color:var(--accent);">all need redesigning</strong>
    </div>
</div>

<div class="click-hint" id="hint">CLICK or → to advance</div>
<div class="step-counter"><span class="cur" id="stepNum">0</span> / 4</div>

<script>
let step = 0;
function advance() {
    if (step >= 4) return;
    step++;
    document.getElementById('stepNum').textContent = step;
    document.querySelectorAll(`.r[data-step="${step}"]`).forEach(el => el.classList.add('shown'));
    if (step === 1) setTimeout(() => { document.getElementById('fillTrad').style.height = '18%'; }, 100);
    if (step === 2) setTimeout(() => { document.getElementById('fillAi').style.height = '95%'; }, 100);
    if (step >= 4) document.getElementById('hint').textContent = 'Complete';
}
document.addEventListener('click', advance);
document.addEventListener('keydown', (e) => {
    if (['ArrowRight','ArrowDown',' ','Enter'].includes(e.key)) { e.preventDefault(); advance(); }
});
</script>
</body>
</html>
