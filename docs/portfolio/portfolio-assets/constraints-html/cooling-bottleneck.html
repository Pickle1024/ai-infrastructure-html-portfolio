<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooling Bottleneck</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@400;700;800;900&family=Nunito:wght@300;400;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #FAFAFA;
            --dark: #0A0A0A;
            --muted: #999;
            --accent: #E63322;
            --border: #E0E0E0;
            --blue: #3B82F6;
            --font-display: 'Archivo', sans-serif;
            --font-body: 'Nunito', sans-serif;
            --font-mono: 'JetBrains Mono', monospace;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            height: 100%; overflow: hidden;
            background: var(--bg); font-family: var(--font-body);
            color: var(--dark); cursor: pointer; user-select: none;
        }
        .page {
            width: 100vw; height: 100vh;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            padding: clamp(1rem, 2vh, 1.5rem) clamp(2rem, 5vw, 4rem);
            gap: clamp(1.5rem, 4vh, 2.5rem);
        }

        /* STAT */
        .stat {
            text-align: center;
        }
        .stat-label {
            font-family: var(--font-mono);
            font-size: clamp(0.65rem, 1vw, 0.8rem);
            color: var(--muted);
            margin-bottom: 0.2em;
        }
        .stat-number {
            font-family: var(--font-display);
            font-weight: 900;
            line-height: 1;
        }
        .stat-number .num { font-size: clamp(3rem, 9vw, 6rem); color: var(--accent); }
        .stat-number .pct { font-size: clamp(2rem, 5vw, 3.5rem); color: var(--dark); }
        .stat-desc {
            font-family: var(--font-body);
            font-size: clamp(0.8rem, 1.4vw, 1.05rem);
            color: var(--muted);
            margin-top: 0.2em;
        }

        /* CHART AREA */
        .chart-area {
            width: 100%; max-width: 700px;
            display: flex; flex-direction: column;
            gap: clamp(0.4rem, 1vh, 0.6rem);
        }
        .chart-row {
            display: flex; align-items: center;
            gap: clamp(0.8rem, 2vw, 1.2rem);
        }
        .chart-label {
            font-family: var(--font-mono);
            font-size: clamp(0.6rem, 1vw, 0.78rem);
            font-weight: 700;
            min-width: clamp(5rem, 10vw, 7rem);
            text-align: right;
            white-space: nowrap;
        }
        .chart-label.trad { color: var(--blue); }
        .chart-label.ai { color: var(--accent); }

        /* SVG chart */
        .chart-svg {
            flex: 1;
            height: clamp(3rem, 8vh, 5rem);
        }
        .chart-svg svg {
            width: 100%; height: 100%;
        }
        .line-trad {
            fill: none;
            stroke: var(--blue);
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }
        .line-ai {
            fill: none;
            stroke: var(--accent);
            stroke-width: 2.5;
            stroke-linecap: round;
        }
        .area-trad {
            fill: rgba(59, 130, 246, 0.08);
        }
        .area-ai {
            fill: rgba(230, 51, 34, 0.08);
        }
        .grid-line {
            stroke: #eee;
            stroke-width: 1;
        }
        .throttle-zone {
            fill: rgba(230, 51, 34, 0.06);
        }
        .throttle-label {
            font-family: var(--font-mono);
            font-size: 9px;
            fill: var(--accent);
            opacity: 0.6;
        }

        /* Tag under chart */
        .chart-tag {
            text-align: center;
            font-family: var(--font-mono);
            font-size: clamp(0.6rem, 1vw, 0.78rem);
            font-weight: 700;
        }

        /* REVEAL */
        .r {
            opacity: 0; transform: translateY(12px);
            transition: opacity 0.45s cubic-bezier(0.16,1,0.3,1),
                        transform 0.45s cubic-bezier(0.16,1,0.3,1);
        }
        .r.shown { opacity: 1; transform: translateY(0); }

        /* SVG path drawing animation */
        .draw-line {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            transition: stroke-dashoffset 1.5s cubic-bezier(0.16,1,0.3,1);
        }
        .draw-line.animate { stroke-dashoffset: 0; }
        .draw-area {
            opacity: 0;
            transition: opacity 0.8s ease 0.5s;
        }
        .draw-area.animate { opacity: 1; }

        /* HINT */
        .click-hint {
            position: fixed; bottom: clamp(0.8rem, 1.5vh, 1.2rem); right: clamp(1rem, 2vw, 1.5rem);
            font-family: var(--font-mono); font-size: clamp(0.5rem, 0.75vw, 0.6rem);
            color: var(--muted); opacity: 0.5;
        }
        .step-counter {
            position: fixed; bottom: clamp(0.8rem, 1.5vh, 1.2rem); left: clamp(1rem, 2vw, 1.5rem);
            font-family: var(--font-mono); font-size: clamp(0.55rem, 0.85vw, 0.65rem); color: var(--muted);
        }
        .step-counter .cur { color: var(--accent); font-weight: 700; }
    </style>
</head>
<body>
<div class="page">

    <!-- 30% throttle stat -->
    <div class="stat r" data-step="1">
        <div class="stat-label">Overheating → Throttle</div>
        <div class="stat-number">
            <span class="num">30</span><span class="pct">%</span>
        </div>
        <div class="stat-desc">performance loss</div>
    </div>

    <!-- Traditional workload chart -->
    <div class="chart-area">
        <div class="chart-row r" data-step="2">
            <div class="chart-label trad">Traditional<br>Workload</div>
            <div class="chart-svg">
                <svg viewBox="0 0 400 80" preserveAspectRatio="none">
                    <line class="grid-line" x1="0" y1="40" x2="400" y2="40"/>
                    <polygon class="area-trad draw-area" id="areaTrad"
                        points="0,70 30,55 60,35 90,20 120,30 150,50 180,65 210,55 240,25 270,15 300,30 330,55 360,65 400,60 400,80 0,80"/>
                    <polyline class="line-trad draw-line" id="lineTrad"
                        points="0,70 30,55 60,35 90,20 120,30 150,50 180,65 210,55 240,25 270,15 300,30 330,55 360,65 400,60"/>
                </svg>
            </div>
        </div>
        <div class="chart-tag r" data-step="2" style="color:var(--blue);">Peaks and valleys — busy times and quiet times</div>

        <!-- AI workload chart -->
        <div class="chart-row r" data-step="3">
            <div class="chart-label ai">AI<br>Workload</div>
            <div class="chart-svg">
                <svg viewBox="0 0 400 80" preserveAspectRatio="none">
                    <rect class="throttle-zone" x="0" y="0" width="400" height="20" rx="0"/>
                    <text class="throttle-label" x="390" y="14" text-anchor="end">THROTTLE ZONE</text>
                    <line class="grid-line" x1="0" y1="40" x2="400" y2="40"/>
                    <polygon class="area-ai draw-area" id="areaAi"
                        points="0,12 400,12 400,80 0,80"/>
                    <line class="line-ai draw-line" id="lineAi"
                        x1="0" y1="12" x2="400" y2="12"/>
                </svg>
            </div>
        </div>
        <div class="chart-tag r" data-step="3" style="color:var(--accent);">24/7 full load — AI doesn't rest</div>
    </div>

</div>

<div class="click-hint" id="hint">CLICK or → to advance</div>
<div class="step-counter"><span class="cur" id="stepNum">0</span> / 3</div>

<script>
let step = 0;
const maxStep = 3;

function advance() {
    if (step >= maxStep) return;
    step++;
    document.getElementById('stepNum').textContent = step;

    document.querySelectorAll(`.r[data-step="${step}"]`).forEach(el => {
        el.classList.add('shown');
    });

    if (step === 2) {
        setTimeout(() => {
            document.getElementById('lineTrad').classList.add('animate');
            document.getElementById('areaTrad').classList.add('animate');
        }, 100);
    }

    if (step === 3) {
        setTimeout(() => {
            document.getElementById('lineAi').classList.add('animate');
            document.getElementById('areaAi').classList.add('animate');
        }, 100);
        document.getElementById('hint').textContent = 'Complete';
    }
}

document.addEventListener('click', advance);
document.addEventListener('keydown', (e) => {
    if (['ArrowRight','ArrowDown',' ','Enter'].includes(e.key)) { e.preventDefault(); advance(); }
});
</script>

</body>
</html>
